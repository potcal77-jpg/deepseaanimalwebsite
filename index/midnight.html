<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Midnight Zone - Explore the World of the Deep</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Great+Primer+SC&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="category.css">
  <style>
    .zone-hero {
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('/images/midnight-hero.jpg') center/cover no-repeat;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }
    .creature-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }
    .spin-btn {
      background: #00ffff;
      color: #000;
      font-size: 1.4rem;
      font-weight: 700;
      padding: 18px 50px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 30px 0;
      transition: all 0.3s;
    }
    .spin-btn:hover { transform: scale(1.05); background: #00ccff; }
    .spin-btn.spinning { animation: spinAnim 1.2s linear infinite; }
    @keyframes spinAnim { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .revealed-card {
      background: rgba(0,0,0,0.75);
      border-radius: 20px;
      padding: 30px;
      max-width: 420px;
      margin: 30px auto;
      color: white;
      display: none;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
    }
    .revealed-card img {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .revealed-card h2 {
      font-family: 'IM Fell Great Primer SC', serif;
      font-size: 2.2rem;
      margin: 10px 0;
    }
  </style>
</head>
<body>

<header class="zone-hero">
  <div class="nav">
    <div class="icon"><a href="index.html"><img src="/images/home.png" alt="Home"></a></div>
    <div class="menu"><a href="menu.html">☰</a></div>
  </div>
  <div>
    <h1>MIDNIGHT ZONE</h1>
    <p>1,000–4,000 metres • Complete darkness</p>
  </div>
</header>

<div class="creature-container">
  <h2>Spin to Collect a Midnight Zone Creature!</h2>
  <button class="spin-btn" id="spinBtn">SPIN FOR A CREATURE</button>
  
  <div class="revealed-card" id="card">
    <img id="creatureImg" src="" alt="">
    <h2 id="creatureName"></h2>
    <p id="creatureDesc"></p>
    <button class="spin-btn" style="margin-top:20px; font-size:1rem; padding:12px 30px;" onclick="spinAgain()">SPIN AGAIN</button>
  </div>
</div>

<footer>
<div class="socials">
  <a href="https://www.instagram.com/?hl=en" target="_blank" aria-label="Instagram">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.849.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069z"/>
      <circle cx="12" cy="12" r="3.5"/>
      <circle cx="17.5" cy="6.5" r="1.5"/>
    </svg>
  </a>
  <a href="https://www.facebook.com/" target="_blank" aria-label="Facebook">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
    </svg>
  </a>
  <a href="https://x.com/" target="_blank" aria-label="X (Twitter)">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.901 2h3.68l-8.04 9.19L24 22h-7.946l-6.117-8.02L3.95 22H.3l8.61-9.83L0 2h8.17l5.61 7.42L18.9 2zM17.51 20h1.8L7.3 4H5.3l12.21 16z"/>
    </svg>
  </a>
</div>
<div class="subscribe-group">
  <h3>Subscribe</h3>
  <form action="subscribe.html" method="get">
    <input type="email" name="email" placeholder="write your email here..." required>
    <button type="submit" style="display:none;">Subscribe</button>
  </form>
</div>
  <div class="footer-right">
    <div class="logo">
      <img src="/images/logo.png" alt="Deep Sea Animals Logo">
    </div>
    <p>© 2026 Callan Potgieter</p>
  </div>
</footer>

<script>
  const creatures = [
    { name: "Anglerfish", img: "/images/anglerfish.avif", desc: "Famous glowing lure and parasitic male. The ultimate deep-sea ambush predator." },
    { name: "Vampire Squid", img: "/images/vampiresquid.jpg", desc: "Cloak-like webbed arms and eerie bioluminescent displays. Feeds on marine snow." },
    { name: "Gulper Eel", img: "/images/gulpereel.webp", desc: "Huge expandable mouth that can swallow prey much larger than itself." },
    { name: "Dragonfish", img: "/images/dragon.png", desc: "Long barbed teeth and glowing barbel. One of the top predators of the midnight zone." }
  ];

  function spin() {
    const btn = document.getElementById('spinBtn');
    const card = document.getElementById('card');
    
    btn.classList.add('spinning');
    btn.textContent = "SPINNING...";
    card.style.display = "none";

    setTimeout(() => {
      const random = Math.floor(Math.random() * creatures.length);
      const creature = creatures[random];

      document.getElementById('creatureImg').src = creature.img;
      document.getElementById('creatureName').textContent = creature.name;
      document.getElementById('creatureDesc').textContent = creature.desc;

      card.style.display = "block";
      btn.classList.remove('spinning');
      btn.textContent = "SPIN FOR ANOTHER CREATURE";
    }, 1400);
  }

  function spinAgain() {
    document.getElementById('card').style.display = "none";
    spin();
  }

  document.getElementById('spinBtn').addEventListener('click', spin);
</script>
</body>
</html>
